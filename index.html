<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gill Sans','Gill Sans MT',Calibri,system-ui,sans-serif;background:#F5F2EC;min-height:100vh;font-size:13px;}
:root{--gd:#1C3829;--gm:#2D5244;--gl:#3E6B58;--cr:#EDE8DC;--cd:#D8D0C0;--tr:#C4622A;--td:#9E4D20;--mt:#8BAD9A;--bd:#E0DAD0;--wh:#fff;--bg:#F5F2EC;}
#screen-login{min-height:100vh;background:var(--gd);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#screen-login::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 35%,var(--gm) 0%,var(--gd) 70%);pointer-events:none;}
.login-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.login-brand{font-family:Palatino,'Book Antiqua',Georgia,serif;font-size:52px;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:var(--cr);line-height:1;margin-bottom:6px;}
.login-sub{font-size:12px;letter-spacing:.5em;color:var(--mt);text-transform:lowercase;margin-bottom:3.5rem;}
.login-prompt{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mt);margin-bottom:1.5rem;}
.login-cards{display:flex;gap:1.25rem;}
.login-card{width:155px;height:192px;border:.5px solid var(--gl);background:rgba(255,255,255,.03);border-radius:3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.875rem;transition:all .25s;}
.login-card:hover{background:rgba(196,98,42,.08);border-color:var(--tr);transform:translateY(-4px);}
.login-avt{width:60px;height:60px;border-radius:50%;background:var(--gm);border:.5px solid var(--gl);display:flex;align-items:center;justify-content:center;font-family:Palatino,Georgia,serif;font-size:22px;color:var(--cr);transition:all .25s;}
.login-card:hover .login-avt{background:var(--td);border-color:var(--tr);}
.login-cname{font-family:Palatino,Georgia,serif;font-size:22px;color:var(--cr);}
.login-crole{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mt);text-align:center;}
.login-footer{font-size:10px;color:rgba(139,173,154,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:3rem;}
#screen-app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--gd);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:200;}
.topbar-brand{font-family:Palatino,Georgia,serif;font-size:16px;letter-spacing:.22em;text-transform:uppercase;color:var(--cr);cursor:pointer;}
.topbar-mod{font-size:10px;letter-spacing:.18em;color:var(--gl);text-transform:uppercase;margin-left:1rem;}
.topbar-right{display:flex;align-items:center;gap:.875rem;}
.uchip{display:flex;align-items:center;gap:7px;background:var(--gm);border:.5px solid var(--gl);border-radius:20px;padding:4px 12px 4px 7px;}
.udot{width:26px;height:26px;border-radius:50%;background:var(--td);display:flex;align-items:center;justify-content:center;font-family:Palatino,Georgia,serif;font-size:11px;color:var(--cr);}
.uname{font-size:12px;color:var(--cd);}
.btn-logout{background:none;border:.5px solid var(--gl);padding:8px 14px;border-radius:2px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mt);cursor:pointer;font-family:inherit;}
.btn-logout:hover{border-color:var(--tr);color:var(--tr);}
.screen{display:none;flex:1;}
.screen.active{display:block;}
.home-hero{background:var(--gd);padding:2.5rem 2rem 2rem;}
.home-greeting{font-family:Palatino,Georgia,serif;font-size:38px;font-weight:400;color:var(--cr);margin-bottom:4px;}
.home-date{font-size:11px;color:var(--mt);letter-spacing:.15em;text-transform:uppercase;}
.home-body{padding:2rem;}
.home-section-label{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#9a9690;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:.5px solid var(--bd);}
.home-modules{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:700px;}
.home-mod{background:var(--wh);border:.5px solid var(--bd);border-radius:4px;padding:1.5rem 1.25rem;cursor:pointer;transition:all .25s;}
.home-mod:hover{border-color:var(--gd);transform:translateY(-3px);box-shadow:0 4px 20px rgba(0,0,0,.07);}
.home-mod-icon{width:38px;height:38px;border-radius:50%;background:#f0ede6;display:flex;align-items:center;justify-content:center;margin-bottom:.875rem;}
.home-mod:hover .home-mod-icon{background:var(--gd);}
.home-mod:hover .home-mod-icon svg{stroke:var(--cr);}
.home-mod-name{font-family:Palatino,Georgia,serif;font-size:18px;color:var(--gd);margin-bottom:4px;}
.home-mod-desc{font-size:11px;color:#9a9690;line-height:1.4;}
.mod-layout{display:flex;flex-direction:column;min-height:calc(100vh - 54px);}
.mod-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--wh);overflow-x:auto;}
.mod-tab{padding:.8rem 1.25rem;font-size:12px;color:#9a9690;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.mod-tab.act{color:var(--gd);border-bottom-color:var(--gd);font-weight:500;}
.mod-tab:hover:not(.act){background:#faf8f4;color:var(--gm);}
.mod-body{padding:1.5rem;flex:1;}
.cards4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.25rem;}
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem;}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.cards-scroll{display:flex;gap:.625rem;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:.875rem;padding-bottom:2px;scrollbar-width:none;}
.cards-scroll::-webkit-scrollbar{display:none;}
.cards-scroll .card{flex:0 0 auto;min-width:130px;}
.card{background:var(--wh);border:.5px solid var(--bd);border-radius:3px;padding:.875rem 1rem;}

  }
  renderHomeStats();
  showMain(CURRENT_MAIN,true);

function showMain(mod,skipSub){
  CURRENT_MAIN=mod;
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('act'));
  const tab=document.getElementById('mtab-'+mod);
  const panel=document.getElementById('mpanel-'+mod);
  if(tab)tab.classList.add('act');
  if(panel)panel.classList.add('act');
  if(!skipSub)showSub(mod,CURRENT_SUBS[mod]);
  else showSub(mod,CURRENT_SUBS[mod]);
}

function showSub(mod,sub){
  CURRENT_SUBS[mod]=sub;
  // Update sub tabs
  document.querySelectorAll(`#mpanel-${mod} .sub-tab`).forEach(t=>t.classList.remove('act'));
  document.querySelectorAll(`#mpanel-${mod} .sub-panel`).forEach(p=>p.classList.remove('act'));
  const stab=document.getElementById(`stab-${mod}-${sub}`);
  const spanel=document.getElementById(`spanel-${mod}-${sub}`);
  if(stab)stab.classList.add('act');
  if(spanel)spanel.classList.add('act');
  // Render content
  renderSubPanel(mod,sub);
}

function renderSubPanel(mod,sub){
  const id=`spanel-${mod}-${sub}`;
  // Lazy render — only render if panel exists
  if(!document.getElementById(id))return;
  if(mod==='cc'){
    if(sub==='registro')renderCCReg();
    else if(sub==='movimientos')renderCCMov();
  } else if(mod==='trabajos'){
    if(sub==='nuevo')renderTWNuevo();
    else if(sub==='lista')renderTWLista();
    else if(sub==='cobranza')renderTWCob();
    else if(sub==='boletas')renderTWBol();
    else if(sub==='cotizaciones')renderCotizaciones();
    else if(sub==='proveedores')renderProveedores();
  } else if(mod==='resumen'){
    if(sub==='socias')renderRSSoc();
    else if(sub==='mensual')renderRSMen();
    else if(sub==='config')renderRSCfg();
  }
}

// Override old render targets to use new panel IDs
function getPanelEl(mod,sub){return document.getElementById(`spanel-${mod}-${sub}`);}

// ── TOAST NOTIFICATIONS ──
function toast(msg, type='success'){
  const existing=document.getElementById('tril-toast');
  if(existing)existing.remove();
  const el=document.createElement('div');
  el.id='tril-toast';
  const bg=type==='error'?'#C4622A':type==='warn'?'#B8720A':'#2D7A4F';
  el.style.cssText=`position:fixed;bottom:max(80px,calc(env(safe-area-inset-bottom)+72px));left:50%;transform:translateX(-50%);background:${bg};color:#fff;padding:10px 20px;border-radius:4px;font-size:13px;font-family:inherit;z-index:600;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap;pointer-events:none;opacity:1;transition:opacity .4s;`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),400);},2500);
}

// ── STORAGE WITH LOCALSTORAGE FALLBACK ──
// Primary: window.storage (Claude shared storage)
// Fallback: localStorage (browser-local, persists between sessions on same device)
const LS_PREFIX='tril3_local:';

function lsGet(key){
  try{const v=localStorage.getItem(LS_PREFIX+key);return v?{value:v}:null;}catch{return null;}
}
function lsSet(key,val){
  try{localStorage.setItem(LS_PREFIX+key,val);return true;}catch{return false;}
}

async function storageGet(key, retries=3){
  // Try window.storage first
  for(let i=0;i<retries;i++){
    try{
      const r=await window.storage.get(key,true);
      // If window.storage succeeded, also update localStorage as backup
      if(r)lsSet(key,r.value);
      return r;
    }catch(e){
      if(i<retries-1){await new Promise(r=>setTimeout(r,500*(i+1)));continue;}
      // window.storage failed all retries — fall back to localStorage
      console.warn(`window.storage failed for ${key}, using localStorage fallback`);
      return lsGet(key);
    }
  }
}

async function storageSet(key, val, retries=3){
  // Always save to localStorage immediately as backup
  lsSet(key, val);
  // Then try window.storage
  for(let i=0;i<retries;i++){
    try{await window.storage.set(key,val,true);return true;}
    catch(e){
      if(i<retries-1){await new Promise(r=>setTimeout(r,500*(i+1)));continue;}
      // window.storage failed — data is safe in localStorage
      console.warn(`window.storage.set failed for ${key}, saved to localStorage only`);
      return false; // saved locally but not to shared storage
    }
  }
}

async function loadAll(){
  let storageOk=true;
  try{
    // CC
    const r1=await storageGet('tril3:cc');
    if(r1){
      const stored=JSON.parse(r1.value);
      const storedIds=new Set(stored.map(r=>r.id));
      const seedNew=CC_SEED.filter(r=>!storedIds.has(r.id));
      CC_DATA=seedNew.length>0?[...stored,...seedNew]:stored;
      if(seedNew.length>0)await storageSet('tril3:cc',JSON.stringify(CC_DATA));
    } else {
      CC_DATA=CC_SEED.map(t=>({...t}));
      await storageSet('tril3:cc',JSON.stringify(CC_DATA));
    }
    // TW
    const r2=await storageGet('tril3:tw');
    if(r2){
      const stored=JSON.parse(r2.value);
      const storedIds=new Set(stored.map(t=>t.id));
      const seedNew=TW_SEED.filter(t=>!storedIds.has(t.id));
      TW_DATA=seedNew.length>0?[...stored,...seedNew.map(t=>({...t,ingresos:[...t.ingresos],costos:[...t.costos]}))]:stored;
      if(seedNew.length>0)await storageSet('tril3:tw',JSON.stringify(TW_DATA));
    } else {
      TW_DATA=TW_SEED.map(t=>({...t,ingresos:[...t.ingresos],costos:[...t.costos]}));
      await storageSet('tril3:tw',JSON.stringify(TW_DATA));
    }
    // BOL
    const r4=await storageGet('tril3:bol');
    if(r4){
      const stored=JSON.parse(r4.value);
      const storedKeys=new Set(stored.map(b=>`${b.twId}||${b.nBoleta}`));
      const seedNew=BOL_SEED.filter(b=>!storedKeys.has(`${b.twId}||${b.nBoleta}`));
      BOL_DATA=seedNew.length>0?[...stored,...seedNew]:stored;
      if(seedNew.length>0)await storageSet('tril3:bol',JSON.stringify(BOL_DATA));
    } else {
      BOL_DATA=BOL_SEED.map(b=>({...b}));
      await storageSet('tril3:bol',JSON.stringify(BOL_DATA));
    }
    // CFG
    const r3=await storageGet('tril3:cfg');
    if(r3){const c=JSON.parse(r3.value);CFG={...CFG,...c};}
    // COT
    const r5=await storageGet('tril3:cot');
    COT_DATA=r5?JSON.parse(r5.value):[];
    // PROV
    const r6=await storageGet('tril3:prov');
    PROV_DATA=r6?JSON.parse(r6.value):[];
  }catch(e){
    console.warn('loadAll partial error, using what was loaded:',e);
    storageOk=false;
    if(!CC_DATA.length)CC_DATA=CC_SEED.map(t=>({...t}));
    if(!TW_DATA.length)TW_DATA=TW_SEED.map(t=>({...t,ingresos:[...t.ingresos],costos:[...t.costos]}));
    if(!BOL_DATA.length)BOL_DATA=BOL_SEED.map(b=>({...b}));
  }
  return storageOk;
}

let CC_TIPO='Abonos';
let CC_CARGO_TIPO='otros'; // 'sueldo' | 'proveedor' | 'otros'

function setCCTipo(t){CC_TIPO=t;CC_CARGO_TIPO='otros';window.CC_ABONO_TIPO='proyecto';renderCCReg();}
function setCC_ABONO_TIPO(t){window.CC_ABONO_TIPO=t;renderCCReg();}
function setCCCargoTipo(t){CC_CARGO_TIPO=t;renderCCReg();}

function getGastosPendientes(){
  const res=[];
  TW_DATA.forEach(t=>{
    t.costos.forEach((c,i)=>{
      const pagadoCC=CC_DATA.filter(r=>String(r.trabajoId)===String(t.id)&&r.cargo>0).reduce((s,r)=>s+r.cargo,0);
      const totalCostos=t.costos.reduce((s,c2)=>s+c2.monto,0);
      // Use CC truth: if total CC cargo < total costos, there's pending
      const pendiente=Math.max(0,c.monto - (c.pagado?c.monto:0));
      if(!c.pagado && c.monto>0){
        res.push({twId:t.id,twServicio:t.servicio,twEmpresa:t.empresa,idx:i,desc:c.desc,monto:c.monto});
      }
    });
  });
  return res;
}

function getIngresosPendientes(){
  const res=[];
  TW_DATA.forEach(t=>{
    t.ingresos.forEach((ing,i)=>{
      if(!ing.pagado && ing.monto>0){
        res.push({twId:t.id,twServicio:t.servicio,twEmpresa:t.empresa,idx:i,desc:ing.desc,monto:ing.monto});
      }
    });
  });
  return res;
}

function onIngSelChange(){
  const sel=document.getElementById('cc_ing_sel');
  const idx=parseInt(sel.value);
  if(isNaN(idx))return;
  const pending=getIngresosPendientes();
  const p=pending[idx];
  if(!p)return;
  const mEl=document.getElementById('cc_monto');
  const gEl=document.getElementById('cc_glosa');
  if(mEl)mEl.value=p.monto;
  if(gEl)gEl.value=`Pago ingreso — #${p.twId} ${p.twServicio}: ${p.desc}`;
  // set trabajoId hidden
  if(!document.getElementById('cc_tw_ref')) {
    const input=document.createElement('input');
    input.type='hidden';input.id='cc_tw_ref';
    document.getElementById('cc_monto').parentElement.parentElement.appendChild(input);
  }
  document.getElementById('cc_tw_ref').value=JSON.stringify({type:'ing',twId:p.twId,idx:p.idx});
}

function onGastoSelChange(){
  const sel=document.getElementById('cc_gasto_sel');
  const idx=parseInt(sel.value);
  if(isNaN(idx))return;
  const pending=getGastosPendientes();
  const p=pending[idx];
  if(!p)return;
  const mEl=document.getElementById('cc_monto');
  const gEl=document.getElementById('cc_glosa');
  if(mEl)mEl.value=p.monto;
  if(gEl)gEl.value=`Pago gasto — #${p.twId} ${p.twServicio}: ${p.desc}`;
  if(!document.getElementById('cc_tw_ref')) {
    const input=document.createElement('input');
    input.type='hidden';input.id='cc_tw_ref';
    document.getElementById('cc_monto').parentElement.parentElement.appendChild(input);
  }
  document.getElementById('cc_tw_ref').value=JSON.stringify({type:'cos',twId:p.twId,idx:p.idx});
}

function saveCCMov(){
  const g=fv('cc_glosa').trim(),m=parseFloat(fv('cc_monto'))||0;
  if(!g||m<=0)return;
  const isAb=CC_TIPO==='Abonos';
  let trabajoId='';

  // Determine trabajoId
  if(isAb){
    if((window.CC_ABONO_TIPO||'proyecto')==='proyecto'){
      const sel=document.getElementById('cc_ing_sel');
      if(sel&&sel.value!==''){
        const pending=getIngresosPendientes();
        const p=pending[parseInt(sel.value)];
        if(p){
          trabajoId=String(p.twId);
          const tw=TW_DATA.find(x=>x.id==p.twId);
          if(tw&&tw.ingresos[p.idx])tw.ingresos[p.idx].pagado=true;
          saveTW();
        }
      }
    } else {
      // Otro abono
      trabajoId=fv('cc_otro_id').trim();
    }
  } else {
    if(CC_CARGO_TIPO==='sueldo'){
      trabajoId=fv('cc_socia');
    } else if(CC_CARGO_TIPO==='proveedor'){
      const sel=document.getElementById('cc_gasto_sel');
      if(sel&&sel.value!==''){
        const pending=getGastosPendientes();
        const p=pending[parseInt(sel.value)];
        if(p){
          trabajoId=String(p.twId);
          // Mark gasto as paid in project
          const tw=TW_DATA.find(x=>x.id==p.twId);
          if(tw&&tw.costos[p.idx])tw.costos[p.idx].pagado=true;
          saveTW();
        }
      }
    }
  }

  CC_DATA.push({id:uid(),fecha:fv('cc_fec'),tipo:CC_TIPO,trabajoId,glosa:g,abono:isAb?m:0,cargo:isAb?0:m,registradoPor:CU});
  saveCC('✓ Movimiento registrado');renderCCReg();
  const ok=document.getElementById('cc_ok');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}

function ccmResults(){
  const wb=ccBal(CC_DATA);
  const fA=fv('ccm_an'),fT=fv('ccm_tp'),fS=(fv('ccm_sr')||'').toLowerCase();
  const fil=wb.filter(t=>{
    if(fA&&!t.fecha.startsWith(fA))return false;
    if(fT&&t.tipo!==fT)return false;
    if(fS&&![t.glosa,String(t.trabajoId||'')].some(x=>x.toLowerCase().includes(fS)))return false;
    return true;
  });
  const totA=fil.reduce((s,t)=>s+t.abono,0),totC=fil.reduce((s,t)=>s+t.cargo,0);
  const saldo=wb.length?wb[wb.length-1].saldo:0;
  const cards=document.getElementById('ccm_cards');
  if(cards)cards.innerHTML=`
    <div class="card"><div class="card-label">Total movimientos</div><div class="card-val">${CC_DATA.length}</div></div>
    <div class="card"><div class="card-label">Abonos (vista)</div><div class="card-val g">${clp(totA)}</div></div>
    <div class="card"><div class="card-label">Cargos (vista)</div><div class="card-val r">${clp(totC)}</div></div>
    <div class="card"><div class="card-label">Saldo actual</div><div class="card-val ${saldo<0?'r':''}">${clp(saldo)}</div></div>`;
  const rows=[...fil].reverse().map(t=>{
    const[y,m,d]=t.fecha.split('-');
    return`<tr>
      <td style="font-size:11px;color:#5a5a52;white-space:nowrap">${d}/${m}/${y}</td>
      <td><span class="bx ${t.tipo==='Abonos'?'bl':'be'}">${t.tipo==='Abonos'?'Abono':'Cargo'}</span></td>
      <td class="mid">${t.trabajoId||'—'}</td>
      <td style="font-size:11px;color:#5a5a52;max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.glosa)}">${esc(t.glosa)}</td>
      <td class="g tr">${t.abono>0?clp(t.abono):'—'}</td>
      <td class="r tr">${t.cargo>0?clp(t.cargo):'—'}</td>
      <td class="${t.saldo<0?'r':'g'} tr" style="font-weight:500">${clp(t.saldo)}</td>
      <td style="text-align:center;white-space:nowrap">
        <button onclick="editCCMov('${t.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#8BAD9A;padding:8px 10px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center" title="Editar">✏</button>
        <button onclick="deleteCCMov('${t.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#C4622A;padding:8px 10px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center" title="Eliminar">✕</button>
      </td></tr>`;
  }).join('')||`<tr><td colspan="8" class="empty">Sin movimientos</td></tr>`;
  const tbody=document.getElementById('ccm_results_body');
  if(tbody)tbody.innerHTML=rows;
}

function deleteCCMov(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  CC_DATA=CC_DATA.filter(r=>r.id!==id);
  saveCC('✓ Movimiento eliminado');ccmResults();
}

  // Show inline edit modal

function closeCCEdit(){
  document.getElementById('cc-edit-overlay')?.remove();
  document.querySelectorAll('[id^="cc-edit-overlay"]~div').forEach(el=>el.remove());
  // Remove the edit box (last appended div)
  const boxes=document.querySelectorAll('body>div:not([id])');
  boxes.forEach(b=>{if(b.querySelector('#ced_fec'))b.remove();});
}

async function saveCCEdit(id){
  const r=CC_DATA.find(x=>x.id===id);if(!r)return;

function calcBruto(){
  const n=parseFloat(fv('nv_bneto'))||0;
  const fecha=fv('nv_f')||new Date().toISOString().slice(0,10);

  const b=n>0?Math.round(n/(1-pct/100)):0;
  const el=document.getElementById('nv_bv');
  if(el)el.textContent=b>0?`${clp(b)} (retención ${pct}% = ${clp(b-n)})`:'—';

// ── COBRANZA ──
let COB_FILTRO='todo';
let COB_EXPAND={}; // {idx: true/false} - expand state per block

function renderTWCob(){
  function cobradoCC(tid){
    const s=String(tid);
    return CC_DATA.filter(r=>String(r.trabajoId)===s&&r.abono>0).reduce((sum,r)=>sum+r.abono,0);
  }
  function pagosCC(tid){
    const s=String(tid);
    return CC_DATA.filter(r=>String(r.trabajoId)===s&&r.abono>0)
      .sort((a,b)=>a.fecha<b.fecha?-1:1)
      .map(r=>`${r.fecha.split('-').reverse().join('/')} — ${clp(r.abono)}${r.registradoPor?' ('+r.registradoPor+')':''}`);
  }

  const byEmp={};
  TW_DATA.forEach(t=>{
    if(!t.ingresos||t.ingresos.length===0)return;
    const k=t.empresa||'Sin empresa';
    if(!byEmp[k])byEmp[k]=[];
    byEmp[k].push(t);
  });

  const empresas=Object.entries(byEmp).map(([emp,tws])=>{
    let totalPrecio=0,totalCobradoCC=0;
    tws.forEach(t=>{totalPrecio+=t.ingresos.reduce((s,i)=>s+i.monto,0);totalCobradoCC+=cobradoCC(t.id);});
    const pendiente=totalPrecio-totalCobradoCC;
    return{emp,tws,totalPrecio,totalCobradoCC,pendiente};
  }).filter(e=>e.totalPrecio>0).sort((a,b)=>Math.abs(b.pendiente)-Math.abs(a.pendiente));

  // Apply filter
  const filtered=empresas.filter(e=>{
    if(COB_FILTRO==='pendiente')return e.pendiente>0.5||e.pendiente<-0.5;
    if(COB_FILTRO==='pagado')return Math.abs(e.pendiente)<=0.5;
    return true;
  });

  const totalPend=empresas.reduce((s,e)=>s+Math.max(0,e.pendiente),0);
  const totalDev=empresas.reduce((s,e)=>s+Math.max(0,-e.pendiente),0);
  const totalPagado=empresas.reduce((s,e)=>s+e.totalCobradoCC,0);

  function empBlock(e,idx){
    const col=e.pendiente>0?'#B8720A':e.pendiente<0?'#C4622A':'#2D7A4F';
    const pct=e.totalPrecio>0?Math.min(100,Math.round((e.totalCobradoCC/e.totalPrecio)*100)):100;
    const pendLabel=e.pendiente>0?`${clp(e.pendiente)} pendiente`:e.pendiente<0?`Dev. ${clp(-e.pendiente)}`:`✓ Al día`;

    const twRows=e.tws.map(t=>{
      const precio=t.ingresos.reduce((s,i)=>s+i.monto,0);
      if(precio===0)return'';
      const cc=cobradoCC(t.id);
      const pend=precio-cc;
      const isDevol=cc>precio;

      // Apply line-level filter
      if(COB_FILTRO==='pendiente'&&pend<=0.5&&!isDevol)return'';
      if(COB_FILTRO==='pagado'&&(pend>0.5||isDevol))return'';

      const pagosList=pagosCC(t.id);
      const pagosHtml=pagosList.length?`<div style="margin:.25rem 0 .25rem 1.5rem;padding:.375rem .625rem;background:#f0ede6;border-radius:3px;font-size:10px;color:#5a5a52">${pagosList.map(p=>`<div>💳 ${p}</div>`).join('')}</div>`:'';

      let remaining=cc;
      const lineRows=t.ingresos.map(ing=>{
        const linePag=Math.min(ing.monto,Math.max(0,remaining));
        remaining=Math.max(0,remaining-linePag);
        const linePend=ing.monto-linePag;
        // Filter individual lines too
        if(COB_FILTRO==='pendiente'&&linePend<=0.5)return'';
        if(COB_FILTRO==='pagado'&&linePend>0.5)return'';
        return`<div style="display:flex;align-items:center;gap:.5rem;padding:.3rem .75rem .3rem 1.75rem;font-size:11px;border-bottom:.5px solid #f9f6f1">
          <span style="flex:1;color:#7a7670">${esc(ing.desc)||'Ingreso'}</span>
          <span style="min-width:78px;text-align:right;color:#1C3829">${clp(ing.monto)}</span>
          <span style="min-width:78px;text-align:right;color:#2D7A4F">${clp(linePag)}</span>
          <span style="min-width:78px;text-align:right;font-weight:600;color:${linePend>0.5?'#B8720A':linePag>=ing.monto?'#2D7A4F':'#9a9690'}">${linePend>0.5?clp(linePend):linePag>=ing.monto?'✓':'—'}</span>
        </div>`;
      }).join('');

      const twPendCol=isDevol?'#C4622A':pend>0.5?'#B8720A':'#2D7A4F';
      return`<div style="border-bottom:.5px solid #f0ede6">
        <div style="display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:#faf8f4;cursor:pointer" onclick="event.stopPropagation();var det=this.parentElement.querySelector('.tw-detail');det.style.display=det.style.display==='none'?'block':'none'">
          <span style="font-size:12px;font-weight:500;flex:1;color:#1C3829">#${t.id} <span onclick="event.stopPropagation();showSub('trabajos','lista');setTimeout(()=>openDetail(${t.id}),150)" style="text-decoration:underline;text-decoration-style:dotted;cursor:pointer;color:#1C3829">${esc(t.servicio)}</span></span>
          <span style="font-size:11px;color:#9a9690;min-width:78px;text-align:right">${clp(precio)}</span>
          <span style="font-size:11px;color:#2D7A4F;min-width:78px;text-align:right">${clp(cc)}</span>
          <span style="font-size:12px;font-weight:600;min-width:78px;text-align:right;color:${twPendCol}">${isDevol?'Dev. '+clp(-pend):pend>0.5?clp(pend):'✓'}</span>
          <span style="color:#9a9690;font-size:10px">▾</span>
        </div>
        <div class="tw-detail" style="display:none">

function toggleCobBlock(idx){
  const det=document.getElementById('cob_det_'+idx);
  const arr=document.getElementById('cob_arr_'+idx);
  if(!det)return;
  const open=det.style.display==='block';
  det.style.display=open?'none':'block';
  if(arr)arr.textContent=open?'▸':'▾';
  COB_EXPAND[idx]=!open;
}
function collapseAllCob(){
  document.querySelectorAll('[id^="cob_det_"]').forEach((el,i)=>{el.style.display='none';COB_EXPAND[i]=false;});
  document.querySelectorAll('[id^="cob_arr_"]').forEach(el=>el.textContent='▸');
}
function expandAllCob(){
  document.querySelectorAll('[id^="cob_det_"]').forEach((el,i)=>{el.style.display='block';COB_EXPAND[i]=true;});
  document.querySelectorAll('[id^="cob_arr_"]').forEach(el=>el.textContent='▾');
}

    const ps2={Toñi:{neto:0,bruto:0},Jose:{neto:0,bruto:0},Dani:{neto:0,bruto:0}};

    const ucnt={Toñi:new Set(),Jose:new Set(),Dani:new Set()};

        // pre-fill search if coming from verBoleta
    if(_bsr_val){const el=document.getElementById('bsr');if(el)el.value=_bsr_val;}
  }
  bolResults();
}
function bolResults(){
  const bc={Toñi:{bg:'#EAF0F8',tx:'#2A5280'},Jose:{bg:'#EDE8F4',tx:'#5A3A8A'},Dani:{bg:'#E8F4EE',tx:'#2D7A4F'}};
  const fB=fv('bb');
  const fS=(fv('bsr')||'').toLowerCase();
  const vis=BOL_DATA.filter(b=>{
    if(b._hidden)return false;
    if(fB&&b.hechaPor!==fB)return false;
    if(fS&&![b.empresa,b.nBoleta,String(b.twId||'')].some(x=>x.toLowerCase().includes(fS)))return false;
    return true;
  });
  const rows=vis.map(b=>{
    const realIdx=BOL_DATA.indexOf(b);
    const c=bc[b.hechaPor]||{bg:'#f0ece6',tx:'#5a5a52'};
    const nLabel=b.nBoleta?b.nBoleta:'<span class="bx bp">Sin N°</span>';
    const multiTag=b.multi?`<span class="bx" style="background:#f0ede6;color:#9a9690;font-size:8px;margin-left:3px">÷</span>`:'';
    const driveBtn=b.driveLink?`<a href="${b.driveLink}" target="_blank" title="Ver boleta en Drive" style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#2A5280;text-decoration:none;background:#EAF0F8;border:.5px solid #B8CCE0;border-radius:3px;padding:2px 7px;margin-left:5px">📄 PDF</a>`:'';
    return`<tr>
      <td class="mid">${b.twId}</td>
      <td style="font-family:monospace;font-size:11px;white-space:nowrap">${nLabel}${multiTag}</td>
      <td style="font-size:11px;color:#5a5a52;white-space:nowrap">${b.fecha?b.fecha.split('-').reverse().join('/'):'—'}</td>
      <td style="max-width:0;overflow:hidden;text-overflow:ellipsis" title="${esc(b.empresa)}">${esc(b.empresa)}</td>
      <td><span class="bx" style="background:${c.bg};color:${c.tx}">${esc(b.hechaPor)||'—'}</span></td>
      <td class="dim tr">${b.retencion}%</td>
      <td class="g tr">${clp(b.montoNeto)}</td>
      <td class="dim tr">${clp(b.montoBruto-b.montoNeto)}</td>
      <td style="text-align:center;white-space:nowrap">
        <button onclick="showSub('trabajos','lista');setTimeout(()=>openDetail(BOL_DATA[${realIdx}].twId),100)" style="background:none;border:.5px solid var(--bd);border-radius:3px;cursor:pointer;font-size:11px;color:#3E6B58;padding:8px 10px;min-height:36px;display:inline-flex;align-items:center">detalle →</button>
        ${b.driveLink?`<a href="${b.driveLink}" target="_blank" style="margin-left:4px;background:none;border:.5px solid #B8CCE0;border-radius:3px;text-decoration:none;font-size:10px;color:#2A5280;padding:3px 8px;display:inline-block">📄 PDF</a>`:''}
      </td>
    </tr>`;
  }).join('')||`<tr><td colspan="8" class="empty">Sin resultados</td></tr>`;
  const tbody=document.getElementById('bol_results_body');
  if(tbody)tbody.innerHTML=rows;
}

function bolModal(title, data, onSave){
  // Remove any existing modal
  document.getElementById('bol-modal-overlay')?.remove();
  document.getElementById('bol-modal-box')?.remove();

  const overlay=document.createElement('div');
  overlay.className='dp-overlay open';overlay.id='bol-modal-overlay';
  const box=document.createElement('div');
  box.id='bol-modal-box';
  box.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:4px;padding:1.5rem;width:500px;max-width:95vw;z-index:401;box-shadow:0 8px 32px rgba(0,0,0,.15)';

  const twOpts=TW_DATA.map(t=>`<option value="${t.id}" ${data.twId==t.id?'selected':''}>#${t.id} ${esc(t.empresa||'')} — ${esc(t.servicio||'').slice(0,40)}</option>`).join('');
  const retVal=data.retencion||getRetencionForDate(new Date().toISOString().slice(0,10));

  box.innerHTML=`
    <div style="font-family:Palatino,Georgia,serif;font-size:17px;color:var(--gd);margin-bottom:1rem">${title}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
      <div class="fg" style="grid-column:1/-1"><label class="fl">Trabajo</label>
        <select class="fi" id="bm_tw">${twOpts}</select></div>
      <div class="fg"><label class="fl">N° Boleta</label><input class="fi" id="bm_n" value="${esc(data.nBoleta||'')}"/></div>
      <div class="fg"><label class="fl">Emite</label>
        <select class="fi" id="bm_hp">
          <option ${data.hechaPor==='Toñi'?'selected':''}>Toñi</option>
          <option ${data.hechaPor==='Jose'?'selected':''}>Jose</option>
          <option ${data.hechaPor==='Dani'?'selected':''}>Dani</option>
        </select></div>
      <div class="fg"><label class="fl">Empresa</label><input class="fi" id="bm_emp" value="${esc(data.empresa||'')}" list="bm_emp_list" autocomplete="off"/>
        <datalist id="bm_emp_list">${[...new Set(TW_DATA.map(t=>t.empresa||'').filter(Boolean))].sort().map(e=>`<option value="${esc(e)}">`).join('')}</datalist></div>
      <div class="fg"><label class="fl">RUT empresa</label><input class="fi" id="bm_rut" value="${esc(data.rut||'')}"/></div>
      <div class="fg"><label class="fl">Fecha boleta</label><input class="fi" type="date" id="bm_fecha" value="${data.fecha||''}"/></div>
      <div class="fg"><label class="fl">% Retención</label><input class="fi" type="number" id="bm_ret" value="${retVal}" step="0.25" min="0" max="30"/></div>
      <div class="fg"><label class="fl">Monto Neto ($)</label><input class="fi" type="number" id="bm_neto" value="${data.montoNeto||''}" oninput="calcBolBruto()"/></div>
      <div class="fg"><label class="fl">Monto Bruto (calculado)</label>
        <div style="background:#f0ece6;border:.5px solid var(--bd);border-radius:3px;padding:9px 10px;font-size:13px" id="bm_bruto_display">${data.montoBruto?clp(data.montoBruto):'—'}</div></div>
      <div class="fg" style="grid-column:1/-1"><label class="fl">Descripción</label><input class="fi" id="bm_desc" value="${esc(data.descripcion||'')}" placeholder="Ej: Servicios de diseño gráfico"/></div>
      <div class="fg" style="grid-column:1/-1"><label class="fl">Link Drive (PDF)</label><input class="fi" type="url" id="bm_link" value="${esc(data.driveLink||'')}" placeholder="https://drive.google.com/..."/></div>
    </div>
    <div style="display:flex;gap:.5rem">
      <button class="btn-primary" onclick="(${onSave.toString()})()">Guardar</button>
      <button class="btn-secondary" onclick="closeBolModal()">Cancelar</button>
    </div>`;
  document.body.appendChild(overlay);
  document.body.appendChild(box);
  overlay.onclick=closeBolModal;
  calcBolBruto();
}

function calcBolBruto(){
  const neto=parseFloat(document.getElementById('bm_neto')?.value)||0;
  const ret=parseFloat(document.getElementById('bm_ret')?.value)||14.5;
  const bruto=neto>0?Math.round(neto/(1-ret/100)):0;
  const el=document.getElementById('bm_bruto_display');
  if(el)el.textContent=bruto>0?`${clp(bruto)} (ret. ${clp(bruto-neto)})`:'—';
}

function closeBolModal(){
  document.getElementById('bol-modal-overlay')?.remove();
  document.getElementById('bol-modal-box')?.remove();
}

function newBol(){
  bolModal('+ Nueva boleta', {}, function(){
    const neto=parseFloat(document.getElementById('bm_neto')?.value)||0;
    const ret=parseFloat(document.getElementById('bm_ret')?.value)||14.5;
    const bruto=neto>0?Math.round(neto/(1-ret/100)):0;
    const twId=parseInt(document.getElementById('bm_tw')?.value)||0;
    const tw=TW_DATA.find(t=>t.id==twId);
    BOL_DATA.push({
      twId, nBoleta:fv('bm_n'), hechaPor:fv('bm_hp'),
      empresa:fv('bm_emp')||tw?.empresa||'', rut:fv('bm_rut'),
      montoBruto:bruto, montoNeto:neto, retencion:ret, multi:false,
      fecha:fv('bm_fecha'), driveLink:fv('bm_link'), descripcion:fv('bm_desc')
    });
    saveBol('✓ Boleta guardada');closeBolModal();renderTWBol();
  });
}

function editBol(idx){
  const b=BOL_DATA[idx];if(!b)return;
  bolModal('Editar boleta', b, function(){
    const neto=parseFloat(document.getElementById('bm_neto')?.value)||0;
    const ret=parseFloat(document.getElementById('bm_ret')?.value)||14.5;
    const bruto=neto>0?Math.round(neto/(1-ret/100)):0;
    const twId=parseInt(document.getElementById('bm_tw')?.value)||b.twId;
    const tw=TW_DATA.find(t=>t.id==twId);
    BOL_DATA[idx]={...b, twId, nBoleta:fv('bm_n'), hechaPor:fv('bm_hp'),
      empresa:fv('bm_emp')||tw?.empresa||b.empresa, rut:fv('bm_rut'),
      montoBruto:bruto, montoNeto:neto, retencion:ret,
      fecha:fv('bm_fecha'), driveLink:fv('bm_link'), descripcion:fv('bm_desc')};
    saveBol('✓ Boleta guardada');closeBolModal();renderTWBol();
  });
}

function deleteBol(idx){
  if(!confirm('¿Eliminar esta boleta?'))return;
  BOL_DATA.splice(idx,1);
  saveBol('✓ Boleta eliminada');renderTWBol();
}

const COT_STATUS=['Borrador','Enviada','Aceptada','Rechazada','Vencida'];
const COT_STATUS_STYLE={
  'Borrador':'background:#f0ece6;color:#5a5a52',
  'Enviada':'background:#EAF0F8;color:#2A5280',
  'Aceptada':'background:#eaf4ee;color:#2D7A4F',

function renderCotizaciones(){

  const activas=COT_DATA.filter(c=>!['Rechazada','Vencida'].includes(c.status));

      <div class="tw"><table>
        <colgroup><col style="width:8%"><col style="width:16%"><col style="width:22%"><col style="width:8%"><col style="width:9%"><col style="width:10%"><col style="width:18%"><col style="width:9%"></colgroup>
        <thead><tr><th>Fecha</th><th>Empresa</th><th>Servicio</th><th>Por quién</th><th>Estado</th><th class="tr">Monto</th><th>Notas</th><th></th></tr></thead>
        <tbody id="cot_results_body"></tbody>
      </table></div>
    </div>`;
  } else {
    // Update cards
    const cntAct=document.getElementById('cot_cnt_act');

// Swipe right to close detail panel
(function(){
  let _sx=0,_sy=0,_dragging=false;
  document.addEventListener('touchstart',e=>{
    const dp=document.getElementById('detail-panel');
    if(!dp||!dp.classList.contains('open'))return;
    _sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_dragging=true;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!_dragging)return;
    const dp=document.getElementById('detail-panel');
    if(!dp||!dp.classList.contains('open'))return;
    const dx=e.touches[0].clientX-_sx;
    const dy=Math.abs(e.touches[0].clientY-_sy);
    // Only track rightward horizontal swipes
    if(dx>0&&dx>dy*1.5){
      const pct=Math.min(dx/window.innerWidth,1);
      dp.style.transform=`translateX(${dx}px)`;
      dp.style.transition='none';
    }
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!_dragging)return;
    _dragging=false;
    const dp=document.getElementById('detail-panel');
    if(!dp)return;
    const dx=e.changedTouches[0].clientX-_sx;
    dp.style.transition='';
    dp.style.transform='';
    // If swiped more than 35% of screen width → close
    if(dx>window.innerWidth*0.35){
      closeDetail();
    }
  },{passive:true});
})();

function ccPorTrabajo(tid){
  const s=String(tid);
  const ab=CC_DATA.filter(r=>String(r.trabajoId)===s&&r.abono>0).reduce((sum,r)=>sum+r.abono,0);
  const ca=CC_DATA.filter(r=>String(r.trabajoId)===s&&r.cargo>0).reduce((sum,r)=>sum+r.cargo,0);
  return{ab,ca};
}
function calcDist(tws){
  let comT=0,comJ=0,utilCob=0;
  tws.forEach(t=>{
    const {ab,ca}=ccPorTrabajo(t.id);
    const utCob=ab-ca;
    const cfg=getCfg(t.fecha);
    const pct=(t.tipo==='mensual'?cfg.pctMensual:cfg.pctSpot)/100;
    const com=utCob*pct;
    utilCob+=utCob;
    if(t.porQuien==='Toñi')comT+=com;
    else if(t.porQuien==='Jose')comJ+=com;
    else if(t.porQuien==='Trilogia'){comT+=com/2;comJ+=com/2;}
  });
  const utilD=utilCob-CFG.fondoReserva;
  const totalCom=comT+comJ;
  const resto=Math.max(0,utilD-totalCom)/2;
  return{utilCob,comT,comJ,resto,totalT:comT+resto,totalJ:comJ+resto,utilD};
}
function getPag(){
  const mT=t=>t.tipo==='Cargos'&&['toñi','toni'].includes(String(t.trabajoId||'').toLowerCase());
  const mJ=t=>t.tipo==='Cargos'&&String(t.trabajoId||'').toLowerCase()==='jose';
  return{T:CC_DATA.filter(mT).reduce((s,t)=>s+t.cargo,0),J:CC_DATA.filter(mJ).reduce((s,t)=>s+t.cargo,0)};
}

function renderRSMen(){

  const fA=selEl?selEl.value:'';
  const anList=anos(TW_DATA).map(x=>`<option>${x}</option>`).join('');
  const byM={};TW_DATA.forEach(t=>{const m=t.fecha.slice(0,7);if(!byM[m])byM[m]=[];byM[m].push(t);});
  const meses=Object.entries(byM).sort((a,b)=>a[0].localeCompare(b[0])).filter(([m])=>!fA||m.startsWith(fA));
  if(!meses.length){
    document.getElementById('spanel-resumen-mensual').innerHTML=`<div class="sp-full"><div class="ctrls"><select id="rsm_an" onchange="renderRSMen()"><option value="">Todos los años</option>${anList}</select></div><div class="empty">Sin datos</div></div>`;

  const mesData=meses.map(([mes,ts])=>{
    const d=calcDist(ts);

  });

  const labelStyle=`font-size:${FONT};padding:8px 10px;font-weight:500;background:var(--wh);position:sticky;left:0;z-index:10;min-width:130px;box-shadow:2px 0 4px rgba(0,0,0,.04)`;

  const utilRow=`<tr style="border-bottom:2px solid var(--bd)">
    <td style="${labelStyle}">Util. cobrada (CC)</td>
    ${mesData.map(d=>`<td class="g tr" style="font-size:${FONT};padding:8px 10px;font-weight:500">${clp(d.utilCob)}</td>`).join('')}
    <td class="g tr" style="font-size:${FONT};padding:8px 10px;font-weight:700;border-left:2px solid var(--bd)">${clp(allD.utilCob)}</td>
  </tr>`;

  const toniRow=`<tr id="row_toni" style="cursor:pointer" onclick="toggleMenRow('toni')">
    <td style="${labelStyle};color:${CT};font-weight:600"><span id="arr_toni" style="font-size:10px;margin-right:5px;display:inline-block">▸</span>Toñi</td>
    ${mesData.map(d=>`<td class="tr" style="font-size:${FONT};padding:8px 10px;color:${CT};font-weight:600">${clp(d.totalT)}</td>`).join('')}
    <td class="tr" style="font-size:${FONT};padding:8px 10px;font-weight:700;color:${CT};border-left:2px solid var(--bd)">${clp(allD.totalT)}</td>
  </tr>
  <tr id="sub_toni_com" style="display:none;background:#fef6f2">
    <td style="${labelStyle.replace('var(--wh)','#fef6f2')};font-size:11px;padding:5px 10px 5px 28px;color:#9a9690">Comisión</td>
    ${mesData.map(d=>`<td class="tr" style="font-size:11px;padding:5px 10px;color:#9a9690">${clp(d.comT)}</td>`).join('')}
    <td class="tr" style="font-size:11px;padding:5px 10px;color:#9a9690;border-left:2px solid var(--bd)">${clp(allD.comT)}</td>
  </tr>
  <tr id="sub_toni_base" style="display:none;background:#fef6f2">
    <td style="${labelStyle.replace('var(--wh)','#fef6f2')};font-size:11px;padding:5px 10px 8px 28px;color:#9a9690">Base 50%</td>
    ${mesData.map(d=>`<td class="tr" style="font-size:11px;padding:5px 10px 8px;color:#9a9690">${clp(d.resto)}</td>`).join('')}
    <td class="tr" style="font-size:11px;padding:5px 10px 8px;color:#9a9690;border-left:2px solid var(--bd)">${clp(allD.resto)}</td>
  </tr>`;

  const joseRow=`<tr id="row_jose" style="cursor:pointer" onclick="toggleMenRow('jose')">
    <td style="${labelStyle};color:${CJ};font-weight:600"><span id="arr_jose" style="font-size:10px;margin-right:5px;display:inline-block">▸</span>Jose</td>
    ${mesData.map(d=>`<td class="tr" style="font-size:${FONT};padding:8px 10px;color:${CJ};font-weight:600">${clp(d.totalJ)}</td>`).join('')}
    <td class="tr" style="font-size:${FONT};padding:8px 10px;font-weight:700;color:${CJ};border-left:2px solid var(--bd)">${clp(allD.totalJ)}</td>
  </tr>
  <tr id="sub_jose_com" style="display:none;background:#f2f6fd">
    <td style="${labelStyle.replace('var(--wh)','#f2f6fd')};font-size:11px;padding:5px 10px 5px 28px;color:#9a9690">Comisión</td>
    ${mesData.map(d=>`<td class="tr" style="font-size:11px;padding:5px 10px;color:#9a9690">${clp(d.comJ)}</td>`).join('')}
    <td class="tr" style="font-size:11px;padding:5px 10px;color:#9a9690;border-left:2px solid var(--bd)">${clp(allD.comJ)}</td>
  </tr>
  <tr id="sub_jose_base" style="display:none;background:#f2f6fd">
    <td style="${labelStyle.replace('var(--wh)','#f2f6fd')};font-size:11px;padding:5px 10px 8px 28px;color:#9a9690">Base 50%</td>
    ${mesData.map(d=>`<td class="tr" style="font-size:11px;padding:5px 10px 8px;color:#9a9690">${clp(d.resto)}</td>`).join('')}
    <td class="tr" style="font-size:11px;padding:5px 10px 8px;color:#9a9690;border-left:2px solid var(--bd)">${clp(allD.resto)}</td>
  </tr>`;

  const chartId='rsc'+Date.now();
  const tipId='rst'+Date.now();

  document.getElementById('spanel-resumen-mensual').innerHTML=`
    <div class="sp-header" style="padding-bottom:.875rem">
      <div class="ctrls" style="margin-bottom:.875rem"><select id="rsm_an" onchange="renderRSMen()"><option value="">Todos los años</option>${anList}</select></div>
      <div style="display:flex;gap:1.5rem;margin-bottom:.625rem">
        <div style="display:flex;align-items:center;gap:7px;font-size:13px"><span style="width:24px;height:3px;background:${CT};display:inline-block;border-radius:2px"></span><strong style="color:${CT}">Toñi</strong></div>
        <div style="display:flex;align-items:center;gap:7px;font-size:13px"><span style="width:24px;height:3px;background:${CJ};display:inline-block;border-radius:2px"></span><strong style="color:${CJ}">Jose</strong></div>
      </div>
    </div>
    <div class="sp-body" style="padding-top:0">
      <div id="rsm_scroll_wrap" style="overflow-x:auto;overflow-y:visible;position:relative;background:var(--wh)">
        <div id="${tipId}" style="display:none;position:absolute;background:rgba(20,40,30,.93);color:#fff;padding:8px 12px;border-radius:4px;font-size:12px;pointer-events:none;z-index:50;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25);top:12px"></div>
        <svg id="${chartId}" style="display:block;cursor:crosshair"></svg>
        <table style="border-collapse:separate;border-spacing:0;width:auto;min-width:100%">
          <thead><tr style="background:#f0ede6">
            <th style="position:sticky;left:0;top:0;z-index:25;background:#f0ede6;padding:8px 10px;font-size:${FONT};min-width:130px;text-align:left;box-shadow:2px 0 4px rgba(0,0,0,.04)">Métrica</th>
            ${headerCols}${totalHeader}
          </tr></thead>
          <tbody>${utilRow}${toniRow}${joseRow}</tbody>
        </table>
      </div>
    </div>`;

  if(fA){const el=document.getElementById('rsm_an');if(el)el.value=fA;}

  requestAnimationFrame(()=>{
    const svg=document.getElementById(chartId);
    const tip=document.getElementById(tipId);
    const wrap=document.getElementById('rsm_scroll_wrap');
    if(!svg||!wrap)return;
    // Measure table column centers after render
    const ths=wrap.querySelectorAll('thead th');
    if(!ths.length)return;
    const wrapRect=wrap.getBoundingClientRect();
    const colXs=[];
    for(let i=1;i<ths.length-1;i++){
      const r=ths[i].getBoundingClientRect();
      colXs.push(r.left-wrapRect.left+wrap.scrollLeft+r.width/2);
    }
    if(!colXs.length)return;
    const labelW=ths[0].getBoundingClientRect().width;
    const W=wrap.scrollWidth;
    const H=190,padT=12,padB=8,cH=H-padT-padB;
    const maxVal=Math.max(...mesData.map(d=>Math.max(d.totalT,d.totalJ)),1);
    const yOf=v=>padT+cH-(v/maxVal)*cH;
    const fmt=v=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(v);

    const grid=[0,.25,.5,.75,1].map(f=>{
      const y=padT+cH-f*cH,v=f*maxVal;
      const lbl=v>=1000000?`${(v/1000000).toFixed(1)}M`:v>=1000?`${Math.round(v/1000)}k`:'0';
      return`<line x1="${labelW}" y1="${y}" x2="${W}" y2="${y}" stroke="#ede9e2" stroke-width="1"/>
             <text x="${labelW-5}" y="${y+4}" text-anchor="end" font-size="9" fill="#b0aca4">${lbl}</text>`;
    }).join('');

    function curve(pts){
      if(pts.length===1)return`M${pts[0][0]},${pts[0][1]}`;
      let d=`M${pts[0][0]},${pts[0][1]}`;
      for(let i=1;i<pts.length;i++){
        const mx=(pts[i][0]+pts[i-1][0])/2;
        d+=` C${mx},${pts[i-1][1]} ${mx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
      }
      return d;
    }

    const pT=colXs.map((x,i)=>[x,yOf(mesData[i].totalT)]);
    const pJ=colXs.map((x,i)=>[x,yOf(mesData[i].totalJ)]);
    const aT=curve(pT)+` L${colXs[N-1]},${padT+cH} L${colXs[0]},${padT+cH} Z`;
    const aJ=curve(pJ)+` L${colXs[N-1]},${padT+cH} L${colXs[0]},${padT+cH} Z`;
    const dots=colXs.map((x,i)=>`
      <circle cx="${x}" cy="${yOf(mesData[i].totalT)}" r="4" fill="${CT}" stroke="#fff" stroke-width="2"/>
      <circle cx="${x}" cy="${yOf(mesData[i].totalJ)}" r="4" fill="${CJ}" stroke="#fff" stroke-width="2"/>`).join('');

    const zones=colXs.map((x,i)=>{
      const colW=i<colXs.length-1?(colXs[i+1]-colXs[i]):95;
      const zw=Math.min(colW*0.85,80);
      const tt=mesData[i];
      const showTip=`var t=document.getElementById('${tipId}');t.style.display='block';t.innerHTML='<div style="opacity:.7;font-size:10px;margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em">${tt.lbl}</div><div style="color:#F4956A;margin-bottom:3px">&#9670; Toñi &nbsp;${fmt(tt.totalT)}</div><div style="color:#7AB4F5">&#9670; Jose &nbsp;${fmt(tt.totalJ)}</div>';var sl=document.getElementById('rsm_scroll_wrap').scrollLeft;var cx=${x};t.style.left=(cx-sl+t.offsetWidth+16>document.getElementById('rsm_scroll_wrap').clientWidth?cx-t.offsetWidth-8:cx+12)+'px';document.getElementById('vline_${chartId}').setAttribute('x1',cx);document.getElementById('vline_${chartId}').setAttribute('x2',cx);document.getElementById('vline_${chartId}').style.display='block';`;
      const hideTip=`document.getElementById('${tipId}').style.display='none';document.getElementById('vline_${chartId}').style.display='none';`;
      return`<rect x="${x-zw/2}" y="${padT}" width="${zw}" height="${cH}" fill="transparent" onmouseenter="${showTip}" onmouseleave="${hideTip}"/>`;
    }).join('');

    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.setAttribute('width',W);svg.setAttribute('height',H);svg.style.minWidth=W+'px';
    svg.innerHTML=`
      <defs>
        <linearGradient id="gT${chartId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${CT}" stop-opacity=".18"/><stop offset="100%" stop-color="${CT}" stop-opacity=".01"/></linearGradient>
        <linearGradient id="gJ${chartId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${CJ}" stop-opacity=".15"/><stop offset="100%" stop-color="${CJ}" stop-opacity=".01"/></linearGradient>
      </defs>
      ${grid}
      <line id="vline_${chartId}" x1="0" y1="${padT}" x2="0" y2="${padT+cH}" stroke="rgba(0,0,0,.15)" stroke-width="1" stroke-dasharray="4,3" style="display:none"/>
      <path d="${aT}" fill="url(#gT${chartId})"/>
      <path d="${aJ}" fill="url(#gJ${chartId})"/>
      <path d="${curve(pT)}" fill="none" stroke="${CT}" stroke-width="2.5"/>
      <path d="${curve(pJ)}" fill="none" stroke="${CJ}" stroke-width="2.5"/>
      ${dots}${zones}`;
  });
}

function addTasa(){
  CFG.historial.push({desde:fv('cfg_desde'),pctSpot:parseFloat(fv('cfg_spot'))||30,pctMensual:parseFloat(fv('cfg_men'))||15});
  saveCFG();renderRSCfg();
  const ok=document.getElementById('cfg_ok');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}
function saveCFGBase(){
  CFG.fondoReserva=parseFloat(fv('cfg_fondo'))||0;saveCFG();
  const ok=document.getElementById('cfg_ok2');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}
function addRetencion(){
  if(!CFG.retHistorial)CFG.retHistorial=[{desde:'2024-09-01',pct:14.5}];
  CFG.retHistorial.push({desde:fv('cfg_ret_desde'),pct:parseFloat(fv('cfg_ret_pct'))||14.5});
  CFG.retHistorial.sort((a,b)=>b.desde.localeCompare(a.desde));
  saveCFG();renderRSCfg();
  const ok=document.getElementById('cfg_ok3');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}
function getRetencionForDate(fecha){
  const hist=(CFG.retHistorial||[{desde:'2024-09-01',pct:CFG.retencion||14.5}]).sort((a,b)=>b.desde.localeCompare(a.desde));
  const r=hist.find(h=>h.desde<=fecha);
