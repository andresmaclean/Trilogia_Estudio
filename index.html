<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Gill Sans','Gill Sans MT',Calibri,system-ui,sans-serif;background:#F5F2EC;min-height:100vh;font-size:13px;}
:root{--gd:#1C3829;--gm:#2D5244;--gl:#3E6B58;--cr:#EDE8DC;--cd:#D8D0C0;--tr:#C4622A;--td:#9E4D20;--mt:#8BAD9A;--bd:#E0DAD0;--wh:#fff;--bg:#F5F2EC;}
#screen-login{min-height:100vh;background:var(--gd);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#screen-login::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 35%,var(--gm) 0%,var(--gd) 70%);pointer-events:none;}
.login-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.login-brand{font-family:Palatino,'Book Antiqua',Georgia,serif;font-size:52px;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:var(--cr);line-height:1;margin-bottom:6px;}
.login-sub{font-size:12px;letter-spacing:.5em;color:var(--mt);text-transform:lowercase;margin-bottom:3.5rem;}
.login-prompt{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mt);margin-bottom:1.5rem;}
.login-cards{display:flex;gap:1.25rem;}
.login-card{width:155px;height:192px;border:.5px solid var(--gl);background:rgba(255,255,255,.03);border-radius:3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.875rem;transition:all .25s;}
.login-card:hover{background:rgba(196,98,42,.08);border-color:var(--tr);transform:translateY(-4px);}
.login-avt{width:60px;height:60px;border-radius:50%;background:var(--gm);border:.5px solid var(--gl);display:flex;align-items:center;justify-content:center;font-family:Palatino,Georgia,serif;font-size:22px;color:var(--cr);transition:all .25s;}
.login-card:hover .login-avt{background:var(--td);border-color:var(--tr);}
.login-cname{font-family:Palatino,Georgia,serif;font-size:22px;color:var(--cr);}
.login-crole{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mt);text-align:center;}
.login-footer{font-size:10px;color:rgba(139,173,154,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:3rem;}
#screen-app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--gd);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:200;}
.topbar-brand{font-family:Palatino,Georgia,serif;font-size:16px;letter-spacing:.22em;text-transform:uppercase;color:var(--cr);cursor:pointer;}
.topbar-mod{font-size:10px;letter-spacing:.18em;color:var(--gl);text-transform:uppercase;margin-left:1rem;}
.topbar-right{display:flex;align-items:center;gap:.875rem;}
.uchip{display:flex;align-items:center;gap:7px;background:var(--gm);border:.5px solid var(--gl);border-radius:20px;padding:4px 12px 4px 7px;}
.udot{width:26px;height:26px;border-radius:50%;background:var(--td);display:flex;align-items:center;justify-content:center;font-family:Palatino,Georgia,serif;font-size:11px;color:var(--cr);}
.uname{font-size:12px;color:var(--cd);}
.btn-logout{background:none;border:.5px solid var(--gl);padding:8px 14px;border-radius:2px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mt);cursor:pointer;font-family:inherit;}
.btn-logout:hover{border-color:var(--tr);color:var(--tr);}
.screen{display:none;flex:1;}
.screen.active{display:block;}
.home-hero{background:var(--gd);padding:2.5rem 2rem 2rem;}
.home-greeting{font-family:Palatino,Georgia,serif;font-size:38px;font-weight:400;color:var(--cr);margin-bottom:4px;}
.home-date{font-size:11px;color:var(--mt);letter-spacing:.15em;text-transform:uppercase;}
.home-body{padding:2rem;}
.home-section-label{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#9a9690;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:.5px solid var(--bd);}
.home-modules{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:700px;}
.home-mod{background:var(--wh);border:.5px solid var(--bd);border-radius:4px;padding:1.5rem 1.25rem;cursor:pointer;transition:all .25s;}
.home-mod:hover{border-color:var(--gd);transform:translateY(-3px);box-shadow:0 4px 20px rgba(0,0,0,.07);}
.home-mod-icon{width:38px;height:38px;border-radius:50%;background:#f0ede6;display:flex;align-items:center;justify-content:center;margin-bottom:.875rem;}
.home-mod:hover .home-mod-icon{background:var(--gd);}
.home-mod:hover .home-mod-icon svg{stroke:var(--cr);}
.home-mod-name{font-family:Palatino,Georgia,serif;font-size:18px;color:var(--gd);margin-bottom:4px;}
.home-mod-desc{font-size:11px;color:#9a9690;line-height:1.4;}
.mod-layout{display:flex;flex-direction:column;min-height:calc(100vh - 54px);}
.mod-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--wh);overflow-x:auto;}
.mod-tab{padding:.8rem 1.25rem;font-size:12px;color:#9a9690;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.mod-tab.act{color:var(--gd);border-bottom-color:var(--gd);font-weight:500;}
.mod-tab:hover:not(.act){background:#faf8f4;color:var(--gm);}
.mod-body{padding:1.5rem;flex:1;}
.cards4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.25rem;}
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem;}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.cards-scroll{display:flex;gap:.625rem;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:.875rem;padding-bottom:2px;scrollbar-width:none;}
.cards-scroll::-webkit-scrollbar{display:none;}
.cards-scroll .card{flex:0 0 auto;min-width:130px;}
.card{background:var(--wh);border:.5px solid var(--bd);border-radius:3px;padding:.875rem 1rem;}

let _db=null;
async function getDB(){
  if(_db)return _db;
  const {initializeApp,getApps}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const {getFirestore,doc,getDoc,setDoc}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const app=getApps().length?getApps()[0]:initializeApp(FB_CONFIG);
  _db={fs:getFirestore(app),doc,getDoc,setDoc};
  return _db;
}

// localStorage as instant cache
const LS='tril3:';
function lsGet(k){try{const v=localStorage.getItem(LS+k);return v?{value:v}:null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(LS+k,v);}catch{}}

async function storageGet(key){
  // Return localStorage immediately (fast), then sync from Firestore in background
  const cached=lsGet(key);
  try{
    const db=await getDB();
    const snap=await db.getDoc(db.doc(db.fs,'trilogia',key));
    if(snap.exists()){
      const val=snap.data().value;
      lsSet(key,val);
      return{value:val};
    }
    return cached;
  }catch(e){
    console.log('[firestore] get fallback to localStorage:',key);
    return cached;
  }
}

async function storageSet(key,val){
  lsSet(key,val); // save locally first (instant)
  try{
    const db=await getDB();
    await db.setDoc(db.doc(db.fs,'trilogia',key),{value:val,updatedAt:Date.now()});
    return true;
  }catch(e){
    console.log('[firestore] set fallback to localStorage:',key);
    return true; // data safe in localStorage
  }
}

async function loadAll(){

    const r1=await storageGet('tril3:cc');

      CC_DATA=JSON.parse(r1.value);

      CC_DATA=[];
    }
    const r2=await storageGet('tril3:tw');

    const r3=await storageGet('tril3:cfg');

    const r5=await storageGet('tril3:cot');

    console.log('[storage] loadAll used localStorage fallback');
    storageOk=false;
    if(!CC_DATA.length)CC_DATA=[];
    if(!TW_DATA.length)TW_DATA=[];
    if(!BOL_DATA.length)BOL_DATA=[];
  }
  return storageOk;
}

function saveCCMov(){
  const g=fv('cc_glosa').trim(),m=parseFloat(fv('cc_monto'))||0;
  if(!g||m<=0)return;
  const isAb=CC_TIPO==='Abonos';
  let trabajoId='';

  // Determine trabajoId
  if(isAb){
    if((window.CC_ABONO_TIPO||'proyecto')==='proyecto'){
      const sel=document.getElementById('cc_ing_sel');
      if(sel&&sel.value!==''){
        const pending=getIngresosPendientes();
        const p=pending[parseInt(sel.value)];
        if(p){
          trabajoId=String(p.twId);
          const tw=TW_DATA.find(x=>x.id==p.twId);
          if(tw&&tw.ingresos[p.idx])tw.ingresos[p.idx].pagado=true;
          saveTW(null);
        }
      }
    } else {
      // Otro abono
      trabajoId=fv('cc_otro_id').trim();
    }
  } else {
    if(CC_CARGO_TIPO==='sueldo'){
      trabajoId=fv('cc_socia');
    } else if(CC_CARGO_TIPO==='proveedor'){
      const sel=document.getElementById('cc_gasto_sel');
      if(sel&&sel.value!==''){
        const pending=getGastosPendientes();
        const p=pending[parseInt(sel.value)];
        if(p){
          trabajoId=String(p.twId);
          // Mark gasto as paid in project
          const tw=TW_DATA.find(x=>x.id==p.twId);
          if(tw&&tw.costos[p.idx])tw.costos[p.idx].pagado=true;
          saveTW(null);
        }
      }
    }
  }

  CC_DATA.push({id:uid(),fecha:fv('cc_fec'),tipo:CC_TIPO,trabajoId,glosa:g,abono:isAb?m:0,cargo:isAb?0:m,registradoPor:CU});
  saveCC('✓ Movimiento registrado');renderCCReg();
  const ok=document.getElementById('cc_ok');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}

function ccmResults(){
  const wb=ccBal(CC_DATA);
  const fA=fv('ccm_an'),fT=fv('ccm_tp'),fS=(fv('ccm_sr')||'').toLowerCase();
  const fil=wb.filter(t=>{
    if(fA&&!t.fecha.startsWith(fA))return false;
    if(fT&&t.tipo!==fT)return false;
    if(fS&&![t.glosa,String(t.trabajoId||'')].some(x=>x.toLowerCase().includes(fS)))return false;
    return true;
  });
  const totA=fil.reduce((s,t)=>s+t.abono,0),totC=fil.reduce((s,t)=>s+t.cargo,0);
  const saldo=wb.length?wb[wb.length-1].saldo:0;
  const cards=document.getElementById('ccm_cards');
  if(cards)cards.innerHTML=`
    <div class="card"><div class="card-label">Total movimientos</div><div class="card-val">${CC_DATA.length}</div></div>
    <div class="card"><div class="card-label">Abonos (vista)</div><div class="card-val g">${clp(totA)}</div></div>
    <div class="card"><div class="card-label">Cargos (vista)</div><div class="card-val r">${clp(totC)}</div></div>
    <div class="card"><div class="card-label">Saldo actual</div><div class="card-val ${saldo<0?'r':''}">${clp(saldo)}</div></div>`;
  const rows=[...fil].reverse().map(t=>{
    const[y,m,d]=t.fecha.split('-');
    return`<tr>
      <td style="font-size:11px;color:#5a5a52;white-space:nowrap">${d}/${m}/${y}</td>
      <td><span class="bx ${t.tipo==='Abonos'?'bl':'be'}">${t.tipo==='Abonos'?'Abono':'Cargo'}</span></td>
      <td class="mid">${t.trabajoId||'—'}</td>
      <td style="font-size:11px;color:#5a5a52;max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.glosa)}">${esc(t.glosa)}</td>
      <td class="g tr">${t.abono>0?clp(t.abono):'—'}</td>
      <td class="r tr">${t.cargo>0?clp(t.cargo):'—'}</td>
      <td class="${t.saldo<0?'r':'g'} tr" style="font-weight:500">${clp(t.saldo)}</td>
      <td style="text-align:center;white-space:nowrap">
        <button onclick="editCCMov('${t.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#8BAD9A;padding:8px 10px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center" title="Editar">✏</button>
        <button onclick="deleteCCMov('${t.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#C4622A;padding:8px 10px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center" title="Eliminar">✕</button>
      </td></tr>`;
  }).join('')||`<tr><td colspan="8" class="empty">Sin movimientos</td></tr>`;
  const tbody=document.getElementById('ccm_results_body');
  if(tbody)tbody.innerHTML=rows;
}

function deleteCCMov(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  CC_DATA=CC_DATA.filter(r=>r.id!==id);
  saveCC('✓ Movimiento eliminado');ccmResults();

function closeCCEdit(){
  document.getElementById('cc-edit-overlay')?.remove();
  document.querySelectorAll('[id^="cc-edit-overlay"]~div').forEach(el=>el.remove());
  // Remove the edit box (last appended div)
  const boxes=document.querySelectorAll('body>div:not([id])');
  boxes.forEach(b=>{if(b.querySelector('#ced_fec'))b.remove();});
}

async function saveCCEdit(id){
  const r=CC_DATA.find(x=>x.id===id);if(!r)return;
  const tipo=document.getElementById('ced_tipo').value;
  const monto=parseFloat(document.getElementById('ced_monto').value)||0;

  r.tipo=tipo;

  r.abono=tipo==='Abonos'?monto:0;
  r.cargo=tipo==='Cargos'?monto:0;

}

function setNvType(t){
  NV_TYPE=t;

  document.getElementById('nv_type_label').textContent=isCot?'+ Registrar cotización':'+ Registrar nuevo trabajo';
  document.getElementById('nv_btn_t').style.background=isCot?'#f0ece6':'var(--gd)';

  document.getElementById('nv_btn_c').style.color=isCot?'var(--cr)':'#5a5a52';
  // Hide/show boleta section
  ['nv_bf1','nv_bf2','nv_bf3','nv_bf4','nv_bol_sec'].forEach(id=>{
    const e=document.getElementById(id);if(e)e.style.display=isCot?'none':'';
  });

function toggleBol(){
  const show=fv('nv_b')!=='No';
  ['nv_bf1','nv_bf2','nv_bf3','nv_bf4'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display=show?'flex':'none';});
}
function calcBruto(){
  const n=parseFloat(fv('nv_bneto'))||0;
  const fecha=fv('nv_f')||new Date().toISOString().slice(0,10);
  const pct=getRetencionForDate(fecha);
  const b=n>0?Math.round(n/(1-pct/100)):0;
  const el=document.getElementById('nv_bv');
  if(el)el.textContent=b>0?`${clp(b)} (retención ${pct}% = ${clp(b-n)})`:'—';
}
function addNv(t){if(t==='ing')NV_ING.push({desc:'',monto:0,pagado:false});else NV_COS.push({desc:'',monto:0,pagado:false});renderTWNuevo();}
function rmNv(t,i){if(t==='ing')NV_ING.splice(i,1);else NV_COS.splice(i,1);renderTWNuevo();}
async function saveTWNuevo(){
  const s=fv('nv_s').trim();if(!s)return;
  // If cotizacion, save to COT_DATA instead
  if(NV_TYPE==='cotizacion'){
    COT_DATA.unshift({
      id:uid(),servicio:s,persona:fv('nv_p'),empresa:fv('nv_e'),
      porQuien:fv('nv_pq'),fecha:fv('nv_f'),fechaVence:'',
      monto:NV_ING[0]?.monto||0,status:'Vigente',notas:'',driveLink:''
    });
    await saveCot('✓ Cotización registrada');
    NV_ING=[{desc:'',monto:0,pagado:false}];NV_COS=[];renderTWNuevo();
    return;
  }
  const bol=fv('nv_b')||'No';
  const neto=parseFloat(fv('nv_bneto'))||0;
  const retPct=getRetencionForDate(fv('nv_f')||new Date().toISOString().slice(0,10));
  const bruto=neto>0?Math.round(neto/(1-retPct/100)):0;
  // Generate next correlative numeric ID
  const numIds=TW_DATA.map(t=>typeof t.id==='number'?t.id:parseInt(t.id)).filter(n=>!isNaN(n));
  const nextId=numIds.length>0?Math.max(...numIds)+1:1;
  TW_DATA.push({id:nextId,servicio:s,persona:fv('nv_p'),empresa:fv('nv_e'),porQuien:fv('nv_pq'),tipo:fv('nv_tp'),status:fv('nv_st'),fecha:fv('nv_f'),
    boleta:bol,nBoleta:fv('nv_nb'),blink:fv('nv_blink'),montoNeto:neto,montoBruto:bruto,
    ingresos:NV_ING.filter(i=>i.desc||i.monto>0).map(i=>({...i})),
    costos:NV_COS.filter(i=>i.desc||i.monto>0).map(i=>({...i}))});
  await saveTW('✓ Trabajo registrado');
  NV_ING=[{desc:'',monto:0,pagado:false}];NV_COS=[];renderTWNuevo();
}

  </div>`;
}

function tlResults(){

// ── COBRANZA ──
let COB_FILTRO='todo';
let COB_EXPAND={}; // {idx: true/false} - expand state per block

function renderTWCob(){
  function cobradoCC(tid){
    const s=String(tid);
    return CC_DATA.filter(r=>String(r.trabajoId)===s&&r.abono>0).reduce((sum,r)=>sum+r.abono,0);
  }
  function pagosCC(tid){
    const s=String(tid);
    return CC_DATA.filter(r=>String(r.trabajoId)===s&&r.abono>0)
      .sort((a,b)=>a.fecha<b.fecha?-1:1)
      .map(r=>`${r.fecha.split('-').reverse().join('/')} — ${clp(r.abono)}${r.registradoPor?' ('+r.registradoPor+')':''}`);
  }

  const byEmp={};
  TW_DATA.forEach(t=>{
    if(!t.ingresos||t.ingresos.length===0)return;
    const k=t.empresa||'Sin empresa';
    if(!byEmp[k])byEmp[k]=[];
    byEmp[k].push(t);
  });

  const empresas=Object.entries(byEmp).map(([emp,tws])=>{
    let totalPrecio=0,totalCobradoCC=0;
    tws.forEach(t=>{totalPrecio+=t.ingresos.reduce((s,i)=>s+i.monto,0);totalCobradoCC+=cobradoCC(t.id);});
    const pendiente=totalPrecio-totalCobradoCC;
    return{emp,tws,totalPrecio,totalCobradoCC,pendiente};
  }).filter(e=>e.totalPrecio>0).sort((a,b)=>Math.abs(b.pendiente)-Math.abs(a.pendiente));

  // Apply filter
  const filtered=empresas.filter(e=>{
    if(COB_FILTRO==='pendiente')return e.pendiente>0.5||e.pendiente<-0.5;
    if(COB_FILTRO==='pagado')return Math.abs(e.pendiente)<=0.5;
    return true;
  });

  const totalPend=empresas.reduce((s,e)=>s+Math.max(0,e.pendiente),0);
  const totalDev=empresas.reduce((s,e)=>s+Math.max(0,-e.pendiente),0);
  const totalPagado=empresas.reduce((s,e)=>s+e.totalCobradoCC,0);

  function empBlock(e,idx){
    const col=e.pendiente>0?'#B8720A':e.pendiente<0?'#C4622A':'#2D7A4F';
    const pct=e.totalPrecio>0?Math.min(100,Math.round((e.totalCobradoCC/e.totalPrecio)*100)):100;
    const pendLabel=e.pendiente>0?`${clp(e.pendiente)} pendiente`:e.pendiente<0?`Dev. ${clp(-e.pendiente)}`:`✓ Al día`;

    const twRows=e.tws.map(t=>{
      const precio=t.ingresos.reduce((s,i)=>s+i.monto,0);
      if(precio===0)return'';
      const cc=cobradoCC(t.id);
      const pend=precio-cc;
      const isDevol=cc>precio;

      // Apply line-level filter
      if(COB_FILTRO==='pendiente'&&pend<=0.5&&!isDevol)return'';
      if(COB_FILTRO==='pagado'&&(pend>0.5||isDevol))return'';

      const pagosList=pagosCC(t.id);
      const pagosHtml=pagosList.length?`<div style="margin:.25rem 0 .25rem 1.5rem;padding:.375rem .625rem;background:#f0ede6;border-radius:3px;font-size:10px;color:#5a5a52">${pagosList.map(p=>`<div>💳 ${p}</div>`).join('')}</div>`:'';

      let remaining=cc;
      const lineRows=t.ingresos.map(ing=>{
        const linePag=Math.min(ing.monto,Math.max(0,remaining));
        remaining=Math.max(0,remaining-linePag);
        const linePend=ing.monto-linePag;
        // Filter individual lines too
        if(COB_FILTRO==='pendiente'&&linePend<=0.5)return'';
        if(COB_FILTRO==='pagado'&&linePend>0.5)return'';
        return`<div style="display:flex;align-items:center;gap:.5rem;padding:.3rem .75rem .3rem 1.75rem;font-size:11px;border-bottom:.5px solid #f9f6f1">
          <span style="flex:1;color:#7a7670">${esc(ing.desc)||'Ingreso'}</span>
          <span style="min-width:78px;text-align:right;color:#1C3829">${clp(ing.monto)}</span>
          <span style="min-width:78px;text-align:right;color:#2D7A4F">${clp(linePag)}</span>
          <span style="min-width:78px;text-align:right;font-weight:600;color:${linePend>0.5?'#B8720A':linePag>=ing.monto?'#2D7A4F':'#9a9690'}">${linePend>0.5?clp(linePend):linePag>=ing.monto?'✓':'—'}</span>
        </div>`;
      }).join('');

      const twPendCol=isDevol?'#C4622A':pend>0.5?'#B8720A':'#2D7A4F';
      return`<div style="border-bottom:.5px solid #f0ede6">
        <div style="display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:#faf8f4;cursor:pointer" onclick="event.stopPropagation();var det=this.parentElement.querySelector('.tw-detail');det.style.display=det.style.display==='none'?'block':'none'">
          <span style="font-size:12px;font-weight:500;flex:1;color:#1C3829">#${t.id} <span onclick="event.stopPropagation();showSub('trabajos','lista');setTimeout(()=>openDetail(${t.id}),150)" style="text-decoration:underline;text-decoration-style:dotted;cursor:pointer;color:#1C3829">${esc(t.servicio)}</span></span>
          <span style="font-size:11px;color:#9a9690;min-width:78px;text-align:right">${clp(precio)}</span>
          <span style="font-size:11px;color:#2D7A4F;min-width:78px;text-align:right">${clp(cc)}</span>
          <span style="font-size:12px;font-weight:600;min-width:78px;text-align:right;color:${twPendCol}">${isDevol?'Dev. '+clp(-pend):pend>0.5?clp(pend):'✓'}</span>
          <span style="color:#9a9690;font-size:10px">▾</span>
        </div>
        <div class="tw-detail" style="display:none">
          ${pagosHtml}
          <div style="display:flex;gap:.5rem;padding:.25rem .75rem .25rem 1.75rem;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#9a9690;background:#f5f2ec">
            <span style="flex:1">Línea</span>
            <span style="min-width:78px;text-align:right">Precio</span>
            <span style="min-width:78px;text-align:right">Cobrado</span>
            <span style="min-width:78px;text-align:right">Pendiente</span>
          </div>
          ${lineRows}
          ${isDevol?`<div style="padding:.4rem .75rem;background:#fdf0ed;font-size:11px;color:#C4622A;font-weight:500">⚠ Devolución pendiente al cliente: ${clp(-pend)}</div>`:''}
        </div>
      </div>`;
    }).join('');

    return`<div class="cob-block" style="margin-bottom:.875rem" id="cob_${idx}">
      <div class="cob-hdr" style="cursor:pointer" onclick="toggleCobBlock(${idx})">
        <div>
          <div style="font-size:14px;font-weight:500;color:#1C3829">${esc(e.emp)}</div>
          <div style="font-size:11px;color:#9a9690;margin-top:2px">${clp(e.totalPrecio)} total · ${clp(e.totalCobradoCC)} cobrado</div>
          <div class="pbar" style="width:120px;margin-top:5px"><div class="pfill" style="width:${pct}%;background:${col}"></div></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600;color:${col}">${pendLabel}</div>
          <div style="font-size:10px;color:#9a9690;margin-top:3px">${pct}% cobrado <span id="cob_arr_${idx}">${COB_EXPAND[idx]?'▾':'▸'}</span></div>
        </div>
      </div>
      <div id="cob_det_${idx}" style="display:${COB_EXPAND[idx]?'block':'none'}">
        <div style="display:flex;gap:.5rem;padding:.375rem .75rem;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#9a9690;background:#f0ede6">
          <span style="flex:1">Proyecto</span>
          <span style="min-width:78px;text-align:right">Precio</span>
          <span style="min-width:78px;text-align:right">Cobrado</span>
          <span style="min-width:78px;text-align:right">Pendiente</span>
        </div>
        ${twRows}
      </div>
    </div>`;
  }

  const blocks=filtered.map((e,i)=>empBlock(e,i)).join('');

  const fBtnStyle=(f)=>`cursor:pointer;padding:10px 16px;font-size:12px;border-radius:20px;border:none;font-family:inherit;transition:all .2s;min-height:40px;background:${COB_FILTRO===f?(f==='pendiente'?'#FDF3E3':f==='pagado'?'#eaf4ee':'var(--gd)'):'#f0ece6'};color:${COB_FILTRO===f?(f==='pendiente'?'#B8720A':f==='pagado'?'#2D7A4F':'var(--cr)'):'#5a5a52'}`;

  document.getElementById('spanel-trabajos-cobranza').innerHTML=`
    <div class="sp-header">
      <div class="info-banner">ℹ Cobrado calculado desde movimientos de la Cuenta Corriente. Haz clic en cada cliente para ver el detalle.</div>
      <div class="cards-scroll">
        <div class="card"><div class="card-label">Por cobrar</div><div class="card-val w">${clp(totalPend)}</div></div>
        <div class="card"><div class="card-label">Ya cobrado</div><div class="card-val g">${clp(totalPagado)}</div></div>
        <div class="card"><div class="card-label">Devoluciones pendientes</div><div class="card-val r">${clp(totalDev)}</div></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:.875rem;flex-wrap:wrap;gap:.5rem">
        <div style="display:flex;gap:.5rem">
          <button onclick="COB_FILTRO='todo';renderTWCob()" style="${fBtnStyle('todo')}">Todos</button>
          <button onclick="COB_FILTRO='pendiente';renderTWCob()" style="${fBtnStyle('pendiente')}">⏳ Pendiente</button>
          <button onclick="COB_FILTRO='pagado';renderTWCob()" style="${fBtnStyle('pagado')}">✓ Pagado</button>
        </div>
        <div style="display:flex;gap:.5rem">
          <button onclick="collapseAllCob()" style="background:none;border:.5px solid var(--bd);color:#9a9690;padding:10px 16px;border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit;min-height:40px">Colapsar todo ↑</button>
          <button onclick="expandAllCob()" style="background:none;border:.5px solid var(--bd);color:#9a9690;padding:10px 16px;border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit;min-height:40px">Expandir todo ↓</button>
        </div>
      </div>
    </div>
    <div class="sp-body">
      ${blocks||`<div class="empty">Sin resultados para este filtro</div>`}
    </div>`;}

function toggleCobBlock(idx){
  const det=document.getElementById('cob_det_'+idx);
  const arr=document.getElementById('cob_arr_'+idx);
  if(!det)return;
  const open=det.style.display==='block';
  det.style.display=open?'none':'block';
  if(arr)arr.textContent=open?'▸':'▾';
  COB_EXPAND[idx]=!open;
}
function collapseAllCob(){
  document.querySelectorAll('[id^="cob_det_"]').forEach((el,i)=>{el.style.display='none';COB_EXPAND[i]=false;});
  document.querySelectorAll('[id^="cob_arr_"]').forEach(el=>el.textContent='▸');
}
function expandAllCob(){
  document.querySelectorAll('[id^="cob_det_"]').forEach((el,i)=>{el.style.display='block';COB_EXPAND[i]=true;});
  document.querySelectorAll('[id^="cob_arr_"]').forEach(el=>el.textContent='▾');
}

function bolResults(){
  const bc={Toñi:{bg:'#EAF0F8',tx:'#2A5280'},Jose:{bg:'#EDE8F4',tx:'#5A3A8A'},Dani:{bg:'#E8F4EE',tx:'#2D7A4F'}};

    return`<tr>
      <td class="mid">${b.twId}</td>
      <td style="font-family:monospace;font-size:11px;white-space:nowrap">${nLabel}${multiTag}</td>

function calcBolBruto(){
  const neto=parseFloat(document.getElementById('bm_neto')?.value)||0;
  const ret=parseFloat(document.getElementById('bm_ret')?.value)||14.5;
  const bruto=neto>0?Math.round(neto/(1-ret/100)):0;
  const el=document.getElementById('bm_bruto_display');
  if(el)el.textContent=bruto>0?`${clp(bruto)} (ret. ${clp(bruto-neto)})`:'—';
}

      </div>
    </div>

      <div class="tw"><table>
        <colgroup><col style="width:18%"><col style="width:10%"><col style="width:12%"><col style="width:13%"><col style="width:14%"><col style="width:13%"><col style="width:14%"><col style="width:6%"></colgroup>

      </table></div>
      <div id="prov_count" style="font-size:11px;color:#9a9690;padding:.5rem 0"></div>

function provResults(){
  const catFil=fv('prov_cat_fil');
  const srFil=(fv('prov_sr_fil')||'').toLowerCase();
  const vis=PROV_DATA.filter(p=>{
    if(catFil&&p.categoria!==catFil)return false;
    if(srFil&&![p.nombre,p.categoria,p.contacto].filter(Boolean).some(x=>x.toLowerCase().includes(srFil)))return false;
    return true;
  });
  const rows=vis.map(p=>`<tr>
    <td style="font-weight:500">${esc(p.nombre)}</td>
    <td style="font-size:11px">${esc(p.rut||'—')}</td>
    <td><span class="bx" style="background:#f0ece6;color:#5a5a52;font-size:10px">${esc(p.categoria||'—')}</span></td>
    <td style="font-size:11px">${esc(p.contacto||'—')}</td>
    <td style="font-size:11px;max-width:0;overflow:hidden;text-overflow:ellipsis" title="${esc(p.email||'')}">${esc(p.email||'—')}</td>
    <td style="font-size:11px">${esc(p.banco||'—')}</td>
    <td style="font-size:11px">${esc(p.numeroCuenta||'—')}</td>
    <td style="text-align:center;white-space:nowrap">
      <button onclick="editProv(${JSON.stringify(p.id)})" style="background:none;border:none;cursor:pointer;font-size:14px;color:#8BAD9A;padding:8px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center">✏</button>
      <button onclick="deleteProv(${JSON.stringify(p.id)})" style="background:none;border:none;cursor:pointer;font-size:14px;color:#C4622A;padding:8px;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center">✕</button>
    </td>
  </tr>`).join('')||`<tr><td colspan="8" class="empty">Sin proveedores</td></tr>`;
  const tbody=document.getElementById('prov_results_body');
  if(tbody)tbody.innerHTML=rows;
  const cnt=document.getElementById('prov_count');
  if(cnt)cnt.textContent=`${PROV_DATA.length} proveedor${PROV_DATA.length!==1?'es':''}`;
}

function closeProv(){document.getElementById('prov-modal-ov')?.remove();document.getElementById('prov-modal-bx')?.remove();}
function newProv(){provModal({},true);}
function editProv(id){const p=PROV_DATA.find(x=>x.id===id);if(p)provModal(p,false);}
function deleteProv(id){
  if(!confirm('¿Eliminar este proveedor?'))return;
  PROV_DATA=PROV_DATA.filter(p=>p.id!==id);
  saveProv('✓ Proveedor eliminado');if(document.getElementById('prov_results_body'))provResults();else renderProveedores();
}
function saveProvModal(id,isNew){
  const obj={
    id:id||uid(),nombre:fv('pm_n'),rut:fv('pm_rut'),categoria:fv('pm_cat'),
    contacto:fv('pm_c'),email:fv('pm_em'),telefono:fv('pm_tel'),
    banco:fv('pm_banco'),tipoCuenta:fv('pm_tipo_cuenta'),numeroCuenta:fv('pm_ncuenta'),
    titular:fv('pm_titular'),emailPago:fv('pm_em_pago'),notas:fv('pm_notas')
  };
  if(isNew){PROV_DATA.push(obj);}
  else{const i=PROV_DATA.findIndex(p=>p.id===id);if(i>=0)PROV_DATA[i]=obj;}
  saveProv();closeProv();if(document.getElementById('prov_results_body'))provResults();else renderProveedores();
}

      <div style="grid-column:1/-1"><label style="${FL}">Servicio / Proyecto</label><input id="dp_srv" style="${EI};font-size:15px;font-weight:500" value="${esc(t.servicio||'')}"/></div>
      <div><label style="${FL}">Empresa</label><input id="dp_emp" style="${EI}" value="${esc(t.empresa||'')}"/></div>
      <div><label style="${FL}">Persona / Contacto</label><input id="dp_per" style="${EI}" value="${esc(t.persona||'')}"/></div>
      <div><label style="${FL}">Por quién</label>${SEL('dp_pq',['Toñi','Jose','Trilogia'],t.porQuien)}</div>

    // Edit mode - inline fields

      <div style="background:#f0f5fb;border-radius:3px;padding:.625rem;margin-bottom:.5rem">

function dpEd(type,i,f,v){const t=TW_DATA.find(x=>x.id==EDITING_ID);if(t)(type==='ing'?t.ingresos:t.costos)[i][f]=v;}
function dpRm(type,i){const t=TW_DATA.find(x=>x.id==EDITING_ID);if(t){(type==='ing'?t.ingresos:t.costos).splice(i,1);renderDP(t,true);}}
function dpAdd(type){
  const t=TW_DATA.find(x=>x.id==EDITING_ID);if(!t)return;

// Swipe right to close detail panel
(function(){
  let _sx=0,_sy=0,_dragging=false;
  document.addEventListener('touchstart',e=>{
    const dp=document.getElementById('detail-panel');
    if(!dp||!dp.classList.contains('open'))return;
    _sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_dragging=true;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!_dragging)return;
    const dp=document.getElementById('detail-panel');
    if(!dp||!dp.classList.contains('open'))return;
    const dx=e.touches[0].clientX-_sx;
    const dy=Math.abs(e.touches[0].clientY-_sy);
    // Only track rightward horizontal swipes
    if(dx>0&&dx>dy*1.5){
      const pct=Math.min(dx/window.innerWidth,1);
      dp.style.transform=`translateX(${dx}px)`;
      dp.style.transition='none';
    }
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!_dragging)return;
    _dragging=false;
    const dp=document.getElementById('detail-panel');
    if(!dp)return;
    const dx=e.changedTouches[0].clientX-_sx;
    dp.style.transition='';
    dp.style.transform='';
    // If swiped more than 35% of screen width → close
    if(dx>window.innerWidth*0.35){
      closeDetail();
    }
  },{passive:true});
})();

function ccPorTrabajo(tid){
  const s=String(tid);
  const ab=CC_DATA.filter(r=>String(r.trabajoId)===s&&r.abono>0).reduce((sum,r)=>sum+r.abono,0);
  const ca=CC_DATA.filter(r=>String(r.trabajoId)===s&&r.cargo>0).reduce((sum,r)=>sum+r.cargo,0);
  return{ab,ca};
}
function calcDist(tws){
  let comT=0,comJ=0,utilCob=0;
  tws.forEach(t=>{
    const {ab,ca}=ccPorTrabajo(t.id);
    const utCob=ab-ca;
    const cfg=getCfg(t.fecha);
    const pct=(t.tipo==='mensual'?cfg.pctMensual:cfg.pctSpot)/100;
    const com=utCob*pct;
    utilCob+=utCob;
    if(t.porQuien==='Toñi')comT+=com;
    else if(t.porQuien==='Jose')comJ+=com;
    else if(t.porQuien==='Trilogia'){comT+=com/2;comJ+=com/2;}
  });
  const utilD=utilCob-CFG.fondoReserva;
  const totalCom=comT+comJ;
  const resto=Math.max(0,utilD-totalCom)/2;
  return{utilCob,comT,comJ,resto,totalT:comT+resto,totalJ:comJ+resto,utilD};
}
function getPag(){
  const mT=t=>t.tipo==='Cargos'&&['toñi','toni'].includes(String(t.trabajoId||'').toLowerCase());
  const mJ=t=>t.tipo==='Cargos'&&String(t.trabajoId||'').toLowerCase()==='jose';
  return{T:CC_DATA.filter(mT).reduce((s,t)=>s+t.cargo,0),J:CC_DATA.filter(mJ).reduce((s,t)=>s+t.cargo,0)};
}

      return d;
    }

    const pT=colXs.map((x,i)=>[x,yOf(mesData[i].totalT)]);
    const pJ=colXs.map((x,i)=>[x,yOf(mesData[i].totalJ)]);
    const aT=curve(pT)+` L${colXs[N-1]},${padT+cH} L${colXs[0]},${padT+cH} Z`;
    const aJ=curve(pJ)+` L${colXs[N-1]},${padT+cH} L${colXs[0]},${padT+cH} Z`;
    const dots=colXs.map((x,i)=>`
      <circle cx="${x}" cy="${yOf(mesData[i].totalT)}" r="4" fill="${CT}" stroke="#fff" stroke-width="2"/>
      <circle cx="${x}" cy="${yOf(mesData[i].totalJ)}" r="4" fill="${CJ}" stroke="#fff" stroke-width="2"/>`).join('');

    const zones=colXs.map((x,i)=>{
      const colW=i<colXs.length-1?(colXs[i+1]-colXs[i]):95;
      const zw=Math.min(colW*0.85,80);
      const tt=mesData[i];
      const showTip=`var t=document.getElementById('${tipId}');t.style.display='block';t.innerHTML='<div style="opacity:.7;font-size:10px;margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em">${tt.lbl}</div><div style="color:#F4956A;margin-bottom:3px">&#9670; Toñi &nbsp;${fmt(tt.totalT)}</div><div style="color:#7AB4F5">&#9670; Jose &nbsp;${fmt(tt.totalJ)}</div>';var sl=document.getElementById('rsm_scroll_wrap').scrollLeft;var cx=${x};t.style.left=(cx-sl+t.offsetWidth+16>document.getElementById('rsm_scroll_wrap').clientWidth?cx-t.offsetWidth-8:cx+12)+'px';document.getElementById('vline_${chartId}').setAttribute('x1',cx);document.getElementById('vline_${chartId}').setAttribute('x2',cx);document.getElementById('vline_${chartId}').style.display='block';`;
      const hideTip=`document.getElementById('${tipId}').style.display='none';document.getElementById('vline_${chartId}').style.display='none';`;
      return`<rect x="${x-zw/2}" y="${padT}" width="${zw}" height="${cH}" fill="transparent" onmouseenter="${showTip}" onmouseleave="${hideTip}"/>`;
    }).join('');

    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.setAttribute('width',W);svg.setAttribute('height',H);svg.style.minWidth=W+'px';
    svg.innerHTML=`
      <defs>
        <linearGradient id="gT${chartId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${CT}" stop-opacity=".18"/><stop offset="100%" stop-color="${CT}" stop-opacity=".01"/></linearGradient>
        <linearGradient id="gJ${chartId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${CJ}" stop-opacity=".15"/><stop offset="100%" stop-color="${CJ}" stop-opacity=".01"/></linearGradient>
      </defs>
      ${grid}
      <line id="vline_${chartId}" x1="0" y1="${padT}" x2="0" y2="${padT+cH}" stroke="rgba(0,0,0,.15)" stroke-width="1" stroke-dasharray="4,3" style="display:none"/>
      <path d="${aT}" fill="url(#gT${chartId})"/>
      <path d="${aJ}" fill="url(#gJ${chartId})"/>
      <path d="${curve(pT)}" fill="none" stroke="${CT}" stroke-width="2.5"/>
      <path d="${curve(pJ)}" fill="none" stroke="${CJ}" stroke-width="2.5"/>
      ${dots}${zones}`;
  });
}
function toggleMenRow(who){
  ['com','base'].forEach(s=>{
    const el=document.getElementById('sub_'+who+'_'+s);
    if(el)el.style.display=el.style.display==='none'?'':'none';
  });
  const arr=document.getElementById('arr_'+who);
  if(arr)arr.textContent=arr.textContent.trim()==='▸'?'▾':'▸';
}

    <td class="dim tr">${i===0?'<span class="bx bl">Vigente</span>':'Histórica'}</td></tr>`).join('');
  document.getElementById('spanel-resumen-config').innerHTML=`
    <div class="sp-full"><div class="sec"><div class="sec-title">Historial de comisiones</div>
      <div class="tw" style="margin-bottom:1.25rem"><table>
        <colgroup><col style="width:30%"><col style="width:20%"><col style="width:20%"><col style="width:30%"></colgroup>
        <thead><tr><th>Vigente desde</th><th class="tr">% Spot</th><th class="tr">% Mensual</th><th class="tr">Estado</th></tr></thead>
        <tbody>${histRows}</tbody></table></div>
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9a9690;margin-bottom:.75rem">Agregar nueva tasa</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.75rem;align-items:end">
        <div class="fg"><label class="fl">Vigente desde</label><input class="fi" type="date" id="cfg_desde" value="${new Date().toISOString().slice(0,10)}"/></div>
        <div class="fg"><label class="fl">% Spot</label><input class="fi" type="number" id="cfg_spot" value="30" min="0" max="100"/></div>
        <div class="fg"><label class="fl">% Mensual</label><input class="fi" type="number" id="cfg_men" value="15" min="0" max="100"/></div>
        <button class="btn-primary" onclick="addTasa()">Agregar</button>
      </div><span id="cfg_ok" style="display:none" class="toast">✓ Tasa registrada</span>
    </div>
    <div class="sec"><div class="sec-title">Fondo de reserva</div>
      <div class="fgrid">
        <div class="fg"><label class="fl">Fondo de reserva ($)</label>
          <input class="fi" type="number" id="cfg_fondo" value="${CFG.fondoReserva}" min="0"/>
          <span style="font-size:11px;color:#9a9690">Se descuenta antes de repartir</span></div>
      </div>
      <button class="btn-primary" onclick="saveCFGBase()">Guardar</button>
      <span id="cfg_ok2" style="display:none" class="toast">✓ Guardado</span>
    </div>
    <div class="sec"><div class="sec-title">Historial de retención boleta</div>
      <div style="font-size:11px;color:#9a9690;margin-bottom:.875rem">Bruto = Neto ÷ (1 − retención%). Configura distintos porcentajes según fecha vigente.</div>
      ${(()=>{
        const hist=(CFG.retHistorial||[{desde:'2024-09-01',pct:14.5}]).sort((a,b)=>b.desde.localeCompare(a.desde));
        const rows=hist.map((r,i)=>`<tr><td>${r.desde}</td><td class="tr">${r.pct}%</td><td class="dim tr">${i===0?'<span class="bx bl">Vigente</span>':'Histórica'}</td></tr>`).join('');
        return`<div class="tw" style="margin-bottom:.875rem"><table>
          <colgroup><col style="width:40%"><col style="width:25%"><col style="width:35%"></colgroup>
          <thead><tr><th>Vigente desde</th><th class="tr">% Retención</th><th class="tr">Estado</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
      })()}
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:.75rem;align-items:end">
        <div class="fg"><label class="fl">Vigente desde</label><input class="fi" type="date" id="cfg_ret_desde" value="${new Date().toISOString().slice(0,10)}"/></div>
        <div class="fg"><label class="fl">% Retención</label><input class="fi" type="number" id="cfg_ret_pct" value="${(CFG.retHistorial&&CFG.retHistorial[0]?CFG.retHistorial[0].pct:14.5)}" min="0" max="100" step="0.5"/></div>
        <button class="btn-primary" onclick="addRetencion()">Agregar</button>
      </div>
      <span id="cfg_ok3" style="display:none" class="toast">✓ Tasa de retención agregada</span>
    </div>
    <div class="sec"><div class="sec-title" style="font-size:15px">Lógica de distribución</div>
      <div style="font-size:12px;color:#5a5a52;line-height:1.8">
        1. <strong>Utilidad cobrada</strong> = ingresos cobrados − gastos pagados<br>
        2. <strong>Distribuible</strong> = utilidad cobrada − fondo de reserva<br>
        3. <strong>Comisión</strong> = % vigente × utilidad → quien trajo el cliente<br>
        &nbsp;&nbsp;&nbsp;· Si lo trajo <em>Trilogia</em>: 50% Toñi + 50% Jose · Si lo trajo <em>Dani</em>: sin comisión<br>
        4. <strong>Resto</strong> = (distribuible − comisiones) ÷ 2 → cada socia<br>
        5. <strong>Caja disponible</strong> = saldo CC actual − fondo de reserva
      </div>
    </div>
    </div>`;
}
function addTasa(){
  CFG.historial.push({desde:fv('cfg_desde'),pctSpot:parseFloat(fv('cfg_spot'))||30,pctMensual:parseFloat(fv('cfg_men'))||15});
  saveCFG();renderRSCfg();
  const ok=document.getElementById('cfg_ok');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}
function saveCFGBase(){
  CFG.fondoReserva=parseFloat(fv('cfg_fondo'))||0;saveCFG();
  const ok=document.getElementById('cfg_ok2');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}

async function migrarAFirestore(){
  const btn=document.getElementById('btn_migrar');
  btn.textContent='Migrando…';btn.disabled=true;
  const LS='tril3:';
  const keys=['tril3:cc','tril3:tw','tril3:bol','tril3:cot','tril3:prov','tril3:cfg'];
  let ok=0,skip=0;
  for(const key of keys){
    const v=localStorage.getItem(LS+key);
    if(v){
      try{
        await storageSet(key,v);
        ok++;
        btn.textContent=`Migrando… (${ok}/${keys.length})`;
      }catch(e){console.error(e);}
    } else {
      skip++;
    }
  }
  btn.textContent=`✓ Migración completa (${ok} colecciones)`;
  btn.style.background='#2D7A4F';
  setTimeout(()=>{btn.textContent='Migrar datos a Firestore';btn.disabled=false;btn.style.background='';},4000);
}
function addRetencion(){
  if(!CFG.retHistorial)CFG.retHistorial=[{desde:'2024-09-01',pct:14.5}];
  CFG.retHistorial.push({desde:fv('cfg_ret_desde'),pct:parseFloat(fv('cfg_ret_pct'))||14.5});
  CFG.retHistorial.sort((a,b)=>b.desde.localeCompare(a.desde));
  saveCFG();renderRSCfg();
  const ok=document.getElementById('cfg_ok3');ok.style.display='inline-block';setTimeout(()=>ok.style.display='none',2500);
}
function getRetencionForDate(fecha){
  const hist=(CFG.retHistorial||[{desde:'2024-09-01',pct:CFG.retencion||14.5}]).sort((a,b)=>b.desde.localeCompare(a.desde));
  const r=hist.find(h=>h.desde<=fecha);
  return r?r.pct:(CFG.retencion||14.5);
}
